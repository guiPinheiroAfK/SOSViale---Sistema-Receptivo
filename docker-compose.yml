version: '3.8'

services:
  db:
    image: postgres:15
    container_name: receptivo_postgres
    environment:
      POSTGRES_USER: viale_user
      POSTGRES_PASSWORD: teste_viale
      POSTGRES_DB: sos_viale_db
    ports:
      - "5600:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: