services:
  db:
    image: postgres:15-alpine
    container_name: sosviale_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sos_viale_db}
      POSTGRES_USER: ${POSTGRES_USER:-viale_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-viale_password}
    ports:
      - "${POSTGRES_PORT:-5600}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viale_user} -d ${POSTGRES_DB:-sos_viale_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
